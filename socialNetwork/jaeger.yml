apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:latest
          ports:
            - containerPort: 16686 # For Jaeger UI
            - containerPort: 14268 # For Jaeger collector
            - containerPort: 6831  # For Jaeger agent
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      name: ui
      targetPort: 16686
    - port: 14268
      name: collector
      targetPort: 14268
    - port: 6831
      name: agent
      targetPort: 6831
