name: nginx-thrift

type: LoadBalancer

ports:
  - port: 8080
    targetPort: 8080

container:
  image: lewisrye/openresty-thrift
  imageVersion: xenial-beta
  name: nginx-thrift
  ports: 
  - containerPort: 8080
  env:
  - name: fqdn_suffix
    value: ".{{ .Release.Namespace }}.svc.cluster.local"

configMaps:
  - name: nginx.conf
    mountPath: /usr/local/openresty/nginx/conf/nginx.conf 
    value: nginx

  - name: jaeger-config.yml
    mountPath: /social-network-microservices/config/jaeger-config.yml
    value: jaeger-config

# affinity
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: "kubernetes.io/hostname"
          operator: "In"
          values:
          - "minikube"

# tolerations     
tolerations:
- key: "monitoring"
  operator: "Equal"
  value: "enabled"
  effect: "NoSchedule"

jaeger:
  agentHost: "jaeger-agent"
  agentPort: 6831
  samplerType: "const"
  samplerParam: 1
  logSpans: true
  queueSize: 100
  bufferFlushInterval: 10
  disabled: false